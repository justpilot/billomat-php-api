version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    target-branch: main
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - composer
    groups:
      symfony:
        patterns:
          - "symfony/*"
      dev-tools:
        patterns:
          - "phpunit/*"
          - "phpstan/*"
          - "friendsofphp/*"
          - "rector/*"
          - "infection/*"
          - "fakerphp/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    target-branch: main
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
