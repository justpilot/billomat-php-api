name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.4'
            symfony: '7.4.*'
            name: 'Tests (PHP 8.4, Symfony 7.4 LTS)'
          - php: '8.4'
            symfony: '^8.0'
            name: 'Tests (PHP 8.4, Symfony 8.x)'
          - php: '8.5'
            symfony: '^8.0'
            experimental: true
            name: 'Tests (PHP 8.5, Symfony 8.x)'
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2, flex
          ini-values: memory_limit=512M

      - name: Pin Symfony version (${{ matrix.symfony }})
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-progress --no-scripts --no-plugins symfony/flex
          composer config extra.symfony.require "${{ matrix.symfony }}"

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run unit tests
        run: composer test:unit

  quality:
    name: Static Analysis & Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          ini-values: memory_limit=512M

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: PHP-CS-Fixer (lint)
        run: composer lint

      - name: PHPStan (analyse)
        run: composer analyse

      - name: Rector (dry-run)
        run: composer refactor:dry

      - name: Composer audit
        run: composer audit

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: xdebug
          tools: composer:v2
          ini-values: memory_limit=512M

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run Infection
        run: composer mutate -- --logger-github
        env:
          INFECTION_BADGE_API_KEY: ${{ secrets.INFECTION_BADGE_API_KEY }}
